<head>
	<title>Thunder Casino</title>

	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/x-icon" href="favicon.ico">

	<!-- Libraries -->
	<script type="text/javascript" src="./js/decimal.js"></script>

	<script type="text/javascript" src="./js/utils.js"></script>
	<script type="text/javascript" src="./js/auth.js"></script>
	<script type="text/javascript" src="./js/mast.js"></script>
	<script type="text/javascript" src="./js/txns.js"></script>
	<script type="text/javascript" src="./js/sql.js"></script>
	<script type="text/javascript" src="./js/messages.js"></script>
	<script type="text/javascript" src="./js/maxima.js"></script>
	<script type="text/javascript" src="./js/mast-txns.js"></script>
	<script type="text/javascript" src="./js/casino.js"></script>

	<script type="text/javascript" src="./js/items.js"></script>

	<style>
	/* =========================================================================
	 * THUNDER CASINO v0.2.0 — INLINE ANIMATION & GAME STYLES
	 * ========================================================================= */

	/* ---- Screen flash overlay ---- */
	.screen-flash {
		position: fixed;
		top: 0; left: 0; right: 0; bottom: 0;
		pointer-events: none;
		z-index: 9999;
		opacity: 0;
	}
	.screen-flash.flash-win {
		background: #00e676;
		animation: screenFlash 0.4s ease-out forwards;
	}
	.screen-flash.flash-lose {
		background: #ff2d78;
		animation: screenFlash 0.3s ease-out forwards;
	}
	.screen-flash.flash-lock {
		background: #ffd700;
		animation: screenFlash 0.3s ease-out forwards;
	}
	@keyframes screenFlash {
		0%   { opacity: 0; }
		30%  { opacity: 0.25; }
		100% { opacity: 0; }
	}

	/* ---- Shake animation ---- */
	.shake {
		animation: shakeAnim 0.15s ease-in-out 2;
	}
	@keyframes shakeAnim {
		0%, 100% { transform: translateX(0); }
		25%      { transform: translateX(-3px); }
		75%      { transform: translateX(3px); }
	}

	/* ---- Balance flash ---- */
	.balance-flash-green {
		animation: balFlashGreen 0.6s ease-out;
	}
	.balance-flash-red {
		animation: balFlashRed 0.6s ease-out;
	}
	.balance-flash-gold {
		animation: balFlashGold 0.5s ease-out;
	}
	@keyframes balFlashGreen {
		0%   { color: #00e676; text-shadow: 0 0 20px #00e676; }
		100% { color: #ffd700; text-shadow: none; }
	}
	@keyframes balFlashRed {
		0%   { color: #ff2d78; text-shadow: 0 0 20px #ff2d78; }
		100% { color: #ffd700; text-shadow: none; }
	}
	@keyframes balFlashGold {
		0%   { color: #fff; text-shadow: 0 0 30px #ffd700; }
		100% { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
	}

	/* ---- Game area border pulse during spin ---- */
	.game-area.spinning-border {
		border-color: #f5a623;
		animation: borderGlow 1s ease-in-out infinite;
	}
	@keyframes borderGlow {
		0%, 100% { box-shadow: 0 0 15px rgba(245,166,35,0.2); }
		50%      { box-shadow: 0 0 35px rgba(245,166,35,0.5); }
	}
	.game-area.win-border {
		border-color: #00e676;
		animation: winBorderPulse 0.4s ease-in-out 3;
	}
	@keyframes winBorderPulse {
		0%, 100% { box-shadow: 0 0 15px rgba(0,230,118,0.2); }
		50%      { box-shadow: 0 0 40px rgba(0,230,118,0.6); }
	}

	/* ---- Coin flip 3D ---- */
	.coin-stage {
		width: 140px;
		height: 140px;
		margin: 20px auto;
		perspective: 800px;
		display: none;
	}
	.coin-stage.visible { display: block; }
	.coin-body {
		width: 100%;
		height: 100%;
		position: relative;
		transform-style: preserve-3d;
		border-radius: 50%;
	}
	.coin-body.spinning {
		animation: coinSpin3D 2s cubic-bezier(0.17,0.67,0.21,0.99) forwards;
	}
	.coin-body.spinning-heads {
		animation: coinSpinHeads 2s cubic-bezier(0.17,0.67,0.21,0.99) forwards;
	}
	.coin-body.spinning-tails {
		animation: coinSpinTails 2s cubic-bezier(0.17,0.67,0.21,0.99) forwards;
	}
	@keyframes coinSpinHeads {
		0%   { transform: rotateY(0deg); }
		80%  { transform: rotateY(2880deg); }
		100% { transform: rotateY(3240deg); } /* divisible by 360 = heads face front */
	}
	@keyframes coinSpinTails {
		0%   { transform: rotateY(0deg); }
		80%  { transform: rotateY(2880deg); }
		100% { transform: rotateY(3060deg); } /* 3060 = 8.5 * 360 = tails face front */
	}
	.coin-side {
		position: absolute;
		width: 100%;
		height: 100%;
		border-radius: 50%;
		display: flex;
		align-items: center;
		justify-content: center;
		font-family: 'Orbitron', sans-serif;
		font-size: 16px;
		font-weight: 800;
		backface-visibility: hidden;
		border: 3px solid rgba(255,255,255,0.15);
	}
	.coin-side-heads {
		background: linear-gradient(135deg, #f5a623 0%, #ffd700 50%, #e8961f 100%);
		color: #080c18;
		box-shadow: inset 0 0 30px rgba(0,0,0,0.15), 0 0 25px rgba(245,166,35,0.4);
	}
	.coin-side-tails {
		background: linear-gradient(135deg, #7a8aaa 0%, #c0c8e0 50%, #7a8aaa 100%);
		color: #080c18;
		transform: rotateY(180deg);
		box-shadow: inset 0 0 30px rgba(0,0,0,0.15);
	}

	/* ---- Dice display ---- */
	.dice-stage {
		display: none;
		justify-content: center;
		margin: 20px auto;
	}
	.dice-stage.visible { display: flex; }
	.die-face {
		width: 100px;
		height: 100px;
		border-radius: 18px;
		background: linear-gradient(145deg, #f0f0f0, #d8d8d8);
		display: grid;
		padding: 14px;
		box-shadow: 0 8px 24px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.5);
		transition: transform 0.1s ease;
	}
	.die-face.rolling {
		animation: dieShake 0.1s linear infinite;
	}
	@keyframes dieShake {
		0%   { transform: rotate(-5deg) scale(1.05); }
		50%  { transform: rotate(5deg) scale(0.95); }
		100% { transform: rotate(-5deg) scale(1.05); }
	}
	.die-face.settled {
		animation: dieSettle 0.3s ease-out forwards;
	}
	@keyframes dieSettle {
		0%   { transform: scale(1.15) rotate(3deg); }
		60%  { transform: scale(0.95) rotate(-1deg); }
		100% { transform: scale(1) rotate(0deg); }
	}
	/* Dot grids for each face */
	.die-face[data-val="1"] { grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr; }
	.die-face[data-val="2"] { grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr; }
	.die-face[data-val="3"] { grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr; }
	.die-face[data-val="4"] { grid-template: 1fr 1fr / 1fr 1fr; }
	.die-face[data-val="5"] { grid-template: 1fr 1fr 1fr / 1fr 1fr 1fr; }
	.die-face[data-val="6"] { grid-template: 1fr 1fr 1fr / 1fr 1fr; }
	.die-dot {
		width: 14px;
		height: 14px;
		border-radius: 50%;
		background: #1a1a2e;
		box-shadow: inset 0 2px 3px rgba(0,0,0,0.4);
		justify-self: center;
		align-self: center;
	}

	/* ---- Roulette scroll strip ---- */
	.roulette-stage {
		display: none;
		justify-content: center;
		margin: 20px auto;
	}
	.roulette-stage.visible { display: flex; }
	.roulette-window {
		width: 100px;
		height: 200px;
		overflow: hidden;
		border: 3px solid #f5a623;
		border-radius: 14px;
		position: relative;
		background: rgba(10,16,32,0.9);
		box-shadow: 0 0 20px rgba(245,166,35,0.2);
	}
	.roulette-window::before,
	.roulette-window::after {
		content: '';
		position: absolute;
		left: 0; right: 0;
		height: 60px;
		z-index: 2;
		pointer-events: none;
	}
	.roulette-window::before {
		top: 0;
		background: linear-gradient(to bottom, rgba(10,16,32,0.95), transparent);
	}
	.roulette-window::after {
		bottom: 0;
		background: linear-gradient(to top, rgba(10,16,32,0.95), transparent);
	}
	.roulette-pointer {
		position: absolute;
		top: 50%;
		left: -6px;
		right: -6px;
		height: 2px;
		background: #ffd700;
		z-index: 3;
		box-shadow: 0 0 8px #ffd700;
	}
	.roulette-strip {
		position: absolute;
		left: 0; right: 0;
		transition: none;
	}
	.roulette-num {
		height: 50px;
		display: flex;
		align-items: center;
		justify-content: center;
		font-family: 'Orbitron', sans-serif;
		font-size: 28px;
		font-weight: 700;
		color: #8892b0;
	}
	.roulette-num:nth-child(odd) { color: #ffd700; }
	.roulette-num:nth-child(even) { color: #e6f1ff; }
	.roulette-num.highlight {
		color: #00e676;
		text-shadow: 0 0 15px #00e676;
		font-size: 34px;
	}

	/* ---- Particle confetti ---- */
	.confetti-particle {
		position: fixed;
		width: 8px;
		height: 8px;
		border-radius: 50%;
		pointer-events: none;
		z-index: 9998;
		animation: confettiFall 1.5s ease-out forwards;
	}
	@keyframes confettiFall {
		0%   { opacity: 1; transform: translate(0, 0) scale(1); }
		100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
	}

	/* ---- Floating amount ---- */
	.float-amount {
		position: absolute;
		font-family: 'Orbitron', sans-serif;
		font-weight: 700;
		font-size: 22px;
		pointer-events: none;
		z-index: 100;
		animation: floatUp 1.2s ease-out forwards;
	}
	.float-amount.win { color: #00e676; text-shadow: 0 0 10px rgba(0,230,118,0.5); }
	.float-amount.lose { color: #ff2d78; text-shadow: 0 0 10px rgba(255,45,120,0.5); }
	@keyframes floatUp {
		0%   { opacity: 1; transform: translateY(0) scale(0.8); }
		50%  { opacity: 1; transform: translateY(-30px) scale(1.1); }
		100% { opacity: 0; transform: translateY(-70px) scale(0.9); }
	}

	/* ---- Phase text styling ---- */
	.phase-text {
		font-family: 'Orbitron', sans-serif;
		font-size: 14px;
		letter-spacing: 3px;
		text-transform: uppercase;
	}
	.phase-text.finding {
		color: #8892b0;
		animation: phasePulse 1s ease-in-out infinite;
	}
	.phase-text.locked {
		color: #ffd700;
		animation: phasePop 0.3s ease-out;
	}
	.phase-text.spinning {
		color: #00e5ff;
		animation: phasePulse 0.6s ease-in-out infinite;
	}
	@keyframes phasePulse {
		0%, 100% { opacity: 0.5; }
		50%      { opacity: 1; }
	}
	@keyframes phasePop {
		0%   { transform: scale(0.8); opacity: 0; }
		60%  { transform: scale(1.15); }
		100% { transform: scale(1); opacity: 1; }
	}

	/* ---- SND toggle button ---- */
	.btn-snd {
		font-family: 'Chakra Petch', sans-serif;
		font-size: 11px;
		font-weight: 600;
		padding: 6px 12px;
		border: 1px solid #1a2140;
		border-radius: 8px;
		background: transparent;
		color: #8892b0;
		cursor: pointer;
		transition: all 0.2s ease;
		text-transform: uppercase;
		letter-spacing: 1px;
	}
	.btn-snd:hover { border-color: #f5a623; color: #f5a623; }
	.btn-snd.active { border-color: #00e676; color: #00e676; }

	/* ---- Disabled pick buttons during play ---- */
	.pick-btn.dimmed {
		opacity: 0.3;
		pointer-events: none;
	}

	/* ---- Button press animation ---- */
	.btn-pressed {
		animation: btnPress 0.15s ease-out;
	}
	@keyframes btnPress {
		0%   { transform: translateY(0); }
		50%  { transform: translateY(3px); box-shadow: 0 1px 5px rgba(245,166,35,0.2); }
		100% { transform: translateY(0); }
	}

	/* ---- Win result bounce ---- */
	.result-bounce {
		animation: resultBounce 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
	}
	@keyframes resultBounce {
		0%   { transform: scale(0.5); opacity: 0; }
		60%  { transform: scale(1.2); }
		80%  { transform: scale(0.95); }
		100% { transform: scale(1); opacity: 1; }
	}

	/* ---- Lose shake ---- */
	.result-shake {
		animation: resultShake 0.4s ease-in-out;
	}
	@keyframes resultShake {
		0%, 100% { transform: translateX(0); }
		20%      { transform: translateX(-8px); }
		40%      { transform: translateX(8px); }
		60%      { transform: translateX(-5px); }
		80%      { transform: translateX(5px); }
	}

	/* Hide default result display when animation stage is active */
	.result-display.anim-active .result-number { display: none; }
	</style>
</head>

<div id="screen-flash" class="screen-flash"></div>

<div class="app-container">

<script type="text/javascript">

/* =========================================================================
 * WEB AUDIO API — SOUND ENGINE (SFX)
 * =========================================================================
 * All sounds are synthesized. No audio files needed.
 * Muted by default. Toggle with the SND button.
 * ========================================================================= */

var SFX = (function(){
	var ctx = null;
	var muted = true;
	var initialized = false;

	function init(){
		if(initialized) return;
		try {
			ctx = new (window.AudioContext || window.webkitAudioContext)();
			initialized = true;
		} catch(e){
			console.log("Web Audio not available");
		}
	}

	function ensureCtx(){
		if(!initialized) init();
		if(ctx && ctx.state === 'suspended') ctx.resume();
		return ctx;
	}

	function toggle(){
		if(!initialized) init();
		muted = !muted;
		var btn = document.getElementById('btn-snd');
		if(btn){
			btn.textContent = muted ? 'SND OFF' : 'SND ON';
			btn.classList.toggle('active', !muted);
		}
	}

	function isMuted(){ return muted; }

	// -- Oscillator helper --
	function osc(type, freq, startTime, duration, gainVal, detune){
		var c = ensureCtx();
		if(!c || muted) return;
		var o = c.createOscillator();
		var g = c.createGain();
		o.type = type;
		o.frequency.value = freq;
		if(detune) o.detune.value = detune;
		g.gain.setValueAtTime(gainVal || 0.15, startTime);
		g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
		o.connect(g);
		g.connect(c.destination);
		o.start(startTime);
		o.stop(startTime + duration);
	}

	// -- Noise helper --
	function noise(startTime, duration, gainVal, filterFreq){
		var c = ensureCtx();
		if(!c || muted) return;
		var bufSize = c.sampleRate * duration;
		var buf = c.createBuffer(1, bufSize, c.sampleRate);
		var data = buf.getChannelData(0);
		for(var i=0; i<bufSize; i++) data[i] = Math.random()*2 -1;
		var src = c.createBufferSource();
		src.buffer = buf;
		var g = c.createGain();
		g.gain.setValueAtTime(gainVal || 0.1, startTime);
		g.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
		if(filterFreq){
			var f = c.createBiquadFilter();
			f.type = 'bandpass';
			f.frequency.value = filterFreq;
			f.Q.value = 2;
			src.connect(f);
			f.connect(g);
		} else {
			src.connect(g);
		}
		g.connect(c.destination);
		src.start(startTime);
		src.stop(startTime + duration);
	}

	// ---- Individual sounds ----

	function chip_click(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		osc('square', 800, t, 0.05, 0.12);
		osc('square', 1200, t + 0.01, 0.03, 0.06);
	}

	function lever_pull(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		osc('sawtooth', 200, t, 0.12, 0.15);
		osc('square', 120, t + 0.02, 0.15, 0.1);
		noise(t, 0.2, 0.08, 400);
	}

	function lock_cash(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		osc('square', 1200, t, 0.06, 0.12);
		osc('square', 1500, t + 0.06, 0.06, 0.12);
		osc('sine', 2000, t + 0.12, 0.1, 0.08);
	}

	function spin_whoosh(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		noise(t, 1.5, 0.06, 600);
	}

	function spin_tick(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		osc('square', 2000, t, 0.015, 0.1);
	}

	function dice_rattle(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		for(var i=0; i<5; i++){
			noise(t + i*0.06, 0.04, 0.1, 1000 + Math.random()*2000);
		}
	}

	function coin_flip(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		noise(t, 1.8, 0.04, 800);
		// Amplitude modulation effect via short bursts
		for(var i=0; i<18; i++){
			osc('sine', 600 + Math.random()*200, t + i*0.1, 0.05, 0.03);
		}
	}

	function result_thud(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		osc('sine', 80, t, 0.15, 0.25);
		osc('sine', 60, t, 0.1, 0.15);
		noise(t, 0.06, 0.12, 200);
	}

	function win_fanfare(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		var notes = [523, 659, 784, 1047]; // C5 E5 G5 C6
		for(var i=0; i<notes.length; i++){
			osc('square', notes[i], t + i*0.12, 0.25, 0.1);
			osc('sine', notes[i], t + i*0.12, 0.3, 0.06);
		}
	}

	function lose_wah(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		var o = c.createOscillator();
		var g = c.createGain();
		o.type = 'sawtooth';
		o.frequency.setValueAtTime(400, t);
		o.frequency.exponentialRampToValueAtTime(120, t + 0.5);
		g.gain.setValueAtTime(0.12, t);
		g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
		o.connect(g);
		g.connect(c.destination);
		o.start(t);
		o.stop(t + 0.6);
	}

	function ready_chime(){
		var c = ensureCtx();
		if(!c || muted) return;
		var t = c.currentTime;
		osc('triangle', 880, t, 0.2, 0.08);
		osc('triangle', 1100, t + 0.08, 0.15, 0.05);
	}

	return {
		init: init,
		toggle: toggle,
		isMuted: isMuted,
		chip_click: chip_click,
		lever_pull: lever_pull,
		lock_cash: lock_cash,
		spin_whoosh: spin_whoosh,
		spin_tick: spin_tick,
		dice_rattle: dice_rattle,
		coin_flip: coin_flip,
		result_thud: result_thud,
		win_fanfare: win_fanfare,
		lose_wah: lose_wah,
		ready_chime: ready_chime
	};
})();


/* =========================================================================
 * ANIMATION ENGINE
 * =========================================================================
 * Coin flip, dice roll, roulette scroll, particles, screen flash.
 * ========================================================================= */

var ANIM = (function(){

	// -- Screen flash --
	function screenFlash(type){
		var el = document.getElementById('screen-flash');
		el.className = 'screen-flash';
		// Force reflow
		void el.offsetWidth;
		el.classList.add('flash-' + type);
		setTimeout(function(){ el.className = 'screen-flash'; }, 500);
	}

	// -- Shake game area --
	function shakeGameArea(){
		var el = document.getElementById('game-area');
		el.classList.remove('shake');
		void el.offsetWidth;
		el.classList.add('shake');
		setTimeout(function(){ el.classList.remove('shake'); }, 400);
	}

	// -- Confetti particles --
	function confetti(count){
		count = count || 25;
		var colors = ['#ffd700','#00e676','#fff','#f5a623','#00e5ff'];
		var cx = window.innerWidth / 2;
		var cy = window.innerHeight / 2;
		for(var i=0; i<count; i++){
			var p = document.createElement('div');
			p.className = 'confetti-particle';
			var angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5);
			var dist = 80 + Math.random() * 200;
			var dx = Math.cos(angle) * dist;
			var dy = Math.sin(angle) * dist - 60; // bias upward
			p.style.cssText = 'left:'+cx+'px;top:'+cy+'px;'
				+'background:'+colors[i % colors.length]+';'
				+'width:'+(6+Math.random()*6)+'px;height:'+(6+Math.random()*6)+'px;'
				+'--dx:'+dx+'px;--dy:'+dy+'px;';
			document.body.appendChild(p);
			(function(el){
				setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 1600);
			})(p);
		}
	}

	// -- Float amount text --
	function floatAmount(text, isWin){
		var area = document.getElementById('result-display');
		var el = document.createElement('div');
		el.className = 'float-amount ' + (isWin ? 'win' : 'lose');
		el.textContent = text;
		el.style.left = '50%';
		el.style.top = '20%';
		el.style.transform = 'translateX(-50%)';
		area.style.position = 'relative';
		area.appendChild(el);
		setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 1300);
	}

	// -- Balance flash --
	function flashBalance(isWin){
		var el = document.getElementById('game-my-balance');
		el.classList.remove('balance-flash-green','balance-flash-red','balance-flash-gold');
		void el.offsetWidth;
		el.classList.add(isWin ? 'balance-flash-green' : 'balance-flash-red');
		setTimeout(function(){
			el.classList.remove('balance-flash-green','balance-flash-red');
		}, 700);
	}

	function flashBalanceLock(){
		var el = document.getElementById('game-my-balance');
		el.classList.remove('balance-flash-green','balance-flash-red','balance-flash-gold');
		void el.offsetWidth;
		el.classList.add('balance-flash-gold');
		setTimeout(function(){ el.classList.remove('balance-flash-gold'); }, 600);
	}

	// -- Game area border state --
	function setBorderState(state){
		var el = document.getElementById('game-area');
		el.classList.remove('spinning-border','win-border');
		if(state) {
			void el.offsetWidth;
			el.classList.add(state);
		}
	}

	// -- Dim pick buttons except selected --
	function dimPicks(){
		document.querySelectorAll('.pick-btn').forEach(function(btn){
			if(!btn.classList.contains('selected')) btn.classList.add('dimmed');
		});
	}
	function undimPicks(){
		document.querySelectorAll('.pick-btn').forEach(function(btn){
			btn.classList.remove('dimmed');
		});
	}

	// -- Hide all animation stages --
	function hideAllStages(){
		document.getElementById('coin-stage').classList.remove('visible');
		document.getElementById('dice-stage').classList.remove('visible');
		document.getElementById('roulette-stage').classList.remove('visible');
		document.getElementById('result-display').classList.remove('anim-active');
	}

	// ===== COIN FLIP =====
	var coinSpinTimer = null;

	function startCoinSpin(){
		hideAllStages();
		document.getElementById('result-display').classList.add('anim-active');
		var stage = document.getElementById('coin-stage');
		var body = document.getElementById('coin-body');
		stage.classList.add('visible');
		body.className = 'coin-body spinning';
		SFX.coin_flip();
	}

	function stopCoinSpin(result){
		// result: 0 = heads, 1 = tails
		var body = document.getElementById('coin-body');
		body.className = 'coin-body';
		void body.offsetWidth;
		if(result === 0){
			body.classList.add('spinning-heads');
		} else {
			body.classList.add('spinning-tails');
		}
		SFX.result_thud();
	}

	function hideCoin(){
		document.getElementById('coin-stage').classList.remove('visible');
		document.getElementById('coin-body').className = 'coin-body';
		document.getElementById('result-display').classList.remove('anim-active');
	}

	// ===== DICE =====
	var diceTimer = null;

	function renderDieFace(val){
		// val is 1-6
		var face = document.getElementById('die-face');
		face.setAttribute('data-val', val);
		face.innerHTML = '';
		// Dot patterns
		var patterns = {
			1: [5],
			2: [1,9],
			3: [1,5,9],
			4: [1,3,7,9],
			5: [1,3,5,7,9],
			6: [1,2,3,7,8,9]
		};
		// 3x3 grid positions
		var dots = patterns[val] || [5];
		for(var i=1; i<=9; i++){
			if(dots.indexOf(i) !== -1){
				var d = document.createElement('div');
				d.className = 'die-dot';
				face.appendChild(d);
			} else {
				var s = document.createElement('div');
				face.appendChild(s);
			}
		}
	}

	function startDiceSpin(){
		hideAllStages();
		document.getElementById('result-display').classList.add('anim-active');
		var stage = document.getElementById('dice-stage');
		var face = document.getElementById('die-face');
		stage.classList.add('visible');
		face.classList.add('rolling');
		SFX.dice_rattle();

		// Rapidly cycle faces
		var interval = 60;
		var count = 0;
		diceTimer = setInterval(function(){
			var v = (count % 6) + 1;
			renderDieFace(v);
			count++;
			// Decelerate
			if(count > 15) {
				clearInterval(diceTimer);
				diceTimer = setInterval(function(){
					var v2 = (count % 6) + 1;
					renderDieFace(v2);
					count++;
				}, 200);
			}
		}, interval);
	}

	function stopDiceSpin(result){
		// result: 0-5 (internal), display as 1-6
		if(diceTimer){ clearInterval(diceTimer); diceTimer = null; }
		var displayVal = result + 1;
		renderDieFace(displayVal);
		var face = document.getElementById('die-face');
		face.classList.remove('rolling');
		face.classList.add('settled');
		SFX.result_thud();
		setTimeout(function(){ face.classList.remove('settled'); }, 400);
	}

	function hideDice(){
		if(diceTimer){ clearInterval(diceTimer); diceTimer = null; }
		document.getElementById('dice-stage').classList.remove('visible');
		document.getElementById('die-face').className = 'die-face';
		document.getElementById('result-display').classList.remove('anim-active');
	}

	// ===== ROULETTE =====
	var rouletteAnimId = null;

	function buildRouletteStrip(){
		var strip = document.getElementById('roulette-strip');
		strip.innerHTML = '';
		// Build 4 full sets of 1-36 for seamless scrolling
		for(var s=0; s<4; s++){
			for(var i=1; i<=36; i++){
				var num = document.createElement('div');
				num.className = 'roulette-num';
				num.textContent = i;
				num.setAttribute('data-num', i);
				strip.appendChild(num);
			}
		}
	}

	function startRouletteSpin(){
		hideAllStages();
		document.getElementById('result-display').classList.add('anim-active');
		var stage = document.getElementById('roulette-stage');
		stage.classList.add('visible');
		buildRouletteStrip();
		SFX.spin_whoosh();

		var strip = document.getElementById('roulette-strip');
		var pos = 0;
		var speed = 30; // pixels per frame
		var tickCounter = 0;

		function frame(){
			pos -= speed;
			strip.style.top = pos + 'px';
			tickCounter++;
			if(tickCounter % 3 === 0) SFX.spin_tick();
			// Loop: each number is 50px tall, 36 numbers per set = 1800px
			if(pos < -1800) pos += 1800;
			rouletteAnimId = requestAnimationFrame(frame);
		}
		rouletteAnimId = requestAnimationFrame(frame);
	}

	function stopRouletteSpin(result, callback){
		// result: 0-35 internal, display as 1-36
		if(rouletteAnimId){ cancelAnimationFrame(rouletteAnimId); rouletteAnimId = null; }

		var displayVal = result + 1;
		var strip = document.getElementById('roulette-strip');
		var windowEl = document.getElementById('roulette-window');
		var windowH = windowEl.clientHeight;
		var numH = 50;

		// Target: center the winning number in the window
		// 2nd set starts at index 36, so winning num is at index 36 + result
		var targetIdx = 36 + result;
		var targetTop = -(targetIdx * numH) + (windowH/2) - (numH/2);

		strip.style.transition = 'top 2s cubic-bezier(0.17, 0.67, 0.21, 0.99)';
		strip.style.top = targetTop + 'px';

		// Tick sounds during deceleration
		var ticks = 0;
		var tickInterval = setInterval(function(){
			SFX.spin_tick();
			ticks++;
			if(ticks > 12){
				clearInterval(tickInterval);
			}
		}, 150);

		setTimeout(function(){
			SFX.result_thud();
			strip.style.transition = 'none';
			// Highlight the winning number
			var nums = strip.querySelectorAll('.roulette-num');
			if(nums[targetIdx]) nums[targetIdx].classList.add('highlight');
			if(callback) callback();
		}, 2200);
	}

	function hideRoulette(){
		if(rouletteAnimId){ cancelAnimationFrame(rouletteAnimId); rouletteAnimId = null; }
		document.getElementById('roulette-stage').classList.remove('visible');
		document.getElementById('result-display').classList.remove('anim-active');
	}

	// ===== GENERIC start/stop by game type =====
	function startSpin(gametype){
		setBorderState('spinning-border');
		if(gametype === 'flip') startCoinSpin();
		else if(gametype === 'dice') startDiceSpin();
		else if(gametype === 'roulette') startRouletteSpin();
	}

	function stopSpin(gametype, result, callback){
		if(gametype === 'flip'){
			stopCoinSpin(result);
			setTimeout(function(){ if(callback) callback(); }, 2200);
		} else if(gametype === 'dice'){
			stopDiceSpin(result);
			setTimeout(function(){ if(callback) callback(); }, 500);
		} else if(gametype === 'roulette'){
			stopRouletteSpin(result, callback);
		} else {
			if(callback) callback();
		}
	}

	function hideStage(gametype){
		setBorderState(null);
		if(gametype === 'flip') hideCoin();
		else if(gametype === 'dice') hideDice();
		else if(gametype === 'roulette') hideRoulette();
		else hideAllStages();
	}

	return {
		screenFlash: screenFlash,
		shakeGameArea: shakeGameArea,
		confetti: confetti,
		floatAmount: floatAmount,
		flashBalance: flashBalance,
		flashBalanceLock: flashBalanceLock,
		setBorderState: setBorderState,
		dimPicks: dimPicks,
		undimPicks: undimPicks,
		startSpin: startSpin,
		stopSpin: stopSpin,
		hideStage: hideStage,
		hideAllStages: hideAllStages,
		renderDieFace: renderDieFace
	};
})();


/* =========================================================================
 * GAME STATE MACHINE
 * =========================================================================
 * IDLE -> PLACING -> LOCKED -> SPINNING -> RESULT -> WIN/LOSE -> IDLE
 * ========================================================================= */

var GAME_PHASE = 'IDLE';
var PHASE_GAMETYPE = null;  // game type during current round
var PHASE_PICK = null;      // pick during current round
var PHASE_BETAMT = null;    // bet during current round

function setGamePhase(phase, data){
	GAME_PHASE = phase;
	data = data || {};

	MDS.log("GAME_PHASE: " + phase + " data:" + JSON.stringify(data));

	var numEl = document.getElementById('result-number');
	var labelEl = document.getElementById('result-label');
	var gameArea = document.getElementById('game-area');

	switch(phase){

		case 'IDLE':
			ANIM.hideStage(PHASE_GAMETYPE || CURRENT_GAME);
			ANIM.undimPicks();
			ANIM.setBorderState(null);
			numEl.textContent = '?';
			numEl.className = 'result-number waiting';
			labelEl.textContent = 'PICK YOUR NUMBER';
			labelEl.className = 'result-label waiting';
			enableGameControls(true);
			break;

		case 'PLACING':
			PHASE_GAMETYPE = CURRENT_GAME;
			PHASE_PICK = CURRENT_PICK;
			PHASE_BETAMT = document.getElementById('bet-amount').value;
			enableGameControls(false);
			ANIM.dimPicks();
			numEl.textContent = '?';
			numEl.className = 'result-number waiting';
			labelEl.innerHTML = '<span class="phase-text finding">FINDING HOUSE...</span>';
			labelEl.className = 'result-label';
			ANIM.setBorderState('spinning-border');
			break;

		case 'LOCKED':
			SFX.lock_cash();
			ANIM.screenFlash('lock');
			ANIM.flashBalanceLock();
			labelEl.innerHTML = '<span class="phase-text locked">BET LOCKED</span>';
			labelEl.className = 'result-label';
			break;

		case 'SPINNING':
			labelEl.innerHTML = '<span class="phase-text spinning">REVEALING...</span>';
			labelEl.className = 'result-label';
			ANIM.startSpin(PHASE_GAMETYPE);
			if(PHASE_GAMETYPE === 'flip') SFX.coin_flip();
			else if(PHASE_GAMETYPE === 'dice') SFX.dice_rattle();
			else SFX.spin_whoosh();
			break;

		case 'RESULT':
			// data.result = the outcome number (0-indexed)
			// data.winner = 'player' or 'house'
			var result = data.result;
			var winner = data.winner;
			var isWin = (winner === 'player');
			var gametype = PHASE_GAMETYPE || CURRENT_GAME;

			ANIM.stopSpin(gametype, result, function(){
				// 500ms dramatic pause
				setTimeout(function(){
					if(isWin){
						setGamePhase('WIN', data);
					} else {
						setGamePhase('LOSE', data);
					}
				}, 500);
			});
			break;

		case 'WIN':
			ANIM.hideStage(PHASE_GAMETYPE || CURRENT_GAME);
			ANIM.setBorderState('win-border');
			SFX.win_fanfare();
			ANIM.screenFlash('win');
			ANIM.confetti(30);

			var gametype = PHASE_GAMETYPE || CURRENT_GAME;
			var resultLabel = data.resultLabel || getPickLabel(gametype, data.result);
			numEl.textContent = resultLabel;
			numEl.className = 'result-number win result-bounce';

			var betval = parseFloat(PHASE_BETAMT || document.getElementById('bet-amount').value);
			var game = GAME_TYPES[gametype];
			var payout = betval * (game.payout - 1);
			labelEl.textContent = 'YOU WIN!';
			labelEl.className = 'result-label win';
			ANIM.floatAmount('+' + payout.toFixed(2), true);
			ANIM.flashBalance(true);

			// Update stats
			GAME_WINS++;
			GAME_PROFIT = GAME_PROFIT.plus(new Decimal(betval).mul(game.payout - 1));
			GAME_ROUNDS++;
			updateStats();
			addRoundPip(true, resultLabel);
			addGameLog('win', game.name+': Result='+resultLabel+' Pick='+getPickLabel(gametype, PHASE_PICK)+' -- WIN +'+payout.toFixed(2));

			// Auto-reset after delay
			setTimeout(function(){
				SFX.ready_chime();
				setGamePhase('IDLE');
			}, 3000);
			break;

		case 'LOSE':
			ANIM.hideStage(PHASE_GAMETYPE || CURRENT_GAME);
			ANIM.setBorderState(null);
			SFX.lose_wah();
			ANIM.screenFlash('lose');
			ANIM.shakeGameArea();

			var gametype = PHASE_GAMETYPE || CURRENT_GAME;
			var resultLabel = data.resultLabel || getPickLabel(gametype, data.result);
			numEl.textContent = resultLabel;
			numEl.className = 'result-number lose result-shake';

			labelEl.textContent = 'YOU LOSE';
			labelEl.className = 'result-label lose';
			var betval = parseFloat(PHASE_BETAMT || document.getElementById('bet-amount').value);
			var game = GAME_TYPES[gametype];
			ANIM.floatAmount('-' + parseFloat(betval).toFixed(2), false);
			ANIM.flashBalance(false);

			// Update stats
			GAME_LOSSES++;
			GAME_PROFIT = GAME_PROFIT.sub(new Decimal(betval));
			GAME_ROUNDS++;
			updateStats();
			addRoundPip(false, resultLabel);
			addGameLog('loss', game.name+': Result='+resultLabel+' Pick='+getPickLabel(gametype, PHASE_PICK)+' -- LOSS');

			// Auto-reset after shorter delay
			setTimeout(function(){
				SFX.ready_chime();
				setGamePhase('IDLE');
			}, 2000);
			break;
	}
}

function enableGameControls(enabled){
	var btn = document.getElementById('btn-play');
	if(enabled){
		btn.textContent = 'PLACE BET';
		btn.disabled = (CURRENT_PICK < 0);
		document.querySelectorAll('.game-type-btn').forEach(function(b){ b.disabled = false; });
		document.getElementById('bet-amount').disabled = false;
	} else {
		btn.textContent = 'PLAYING...';
		btn.disabled = true;
		document.querySelectorAll('.game-type-btn').forEach(function(b){ b.disabled = true; });
		document.getElementById('bet-amount').disabled = true;
	}
}


/* =========================================================================
 * APPLICATION STATE
 * ========================================================================= */

var CURRENT_VIEW     = 'channels';
var CURRENT_CHANNEL  = null;    // hashid of the active game channel
var CURRENT_GAME     = 'flip';  // flip, dice, roulette
var CURRENT_PICK     = -1;      // player's selected number
var MAXIMA_CONTACTS  = [];
var USER_BALANCE     = [];
var GAME_WINS        = 0;
var GAME_LOSSES      = 0;
var GAME_PROFIT      = new Decimal(0);
var GAME_ROUNDS      = 0;

/* ---- View management ---- */
function showView(view){
	CURRENT_VIEW = view;
	document.getElementById('view-channels').classList.add('hidden');
	document.getElementById('view-newchannel').classList.add('hidden');
	document.getElementById('view-game').classList.add('hidden');
	document.getElementById('view-'+view).classList.remove('hidden');

	if(view === 'channels') loadChannels();
	if(view === 'newchannel') loadNewChannelForm();
}

/* ---- Channel list ---- */
function loadChannels(){
	sqlSelectAllOpenChannels(function(res){
		var html = '';
		if(res.rows.length === 0){
			html = '<div class="welcome">'
				+'<h2>Welcome to Thunder Casino</h2>'
				+'<p>Open a channel with a Maxima contact to start playing.<br>'
				+'Instant games, provably fair, Layer 2 speed.</p>'
				+'<button class="btn btn-primary btn-lg" onclick="showView(\'newchannel\')">OPEN CHANNEL</button>'
				+'</div>';
		}else{
			for(var i=0; i<res.rows.length; i++){
				html += buildChannelRow(res.rows[i]);
			}
		}
		document.getElementById('channel-list').innerHTML = html;
	});
}

function buildChannelRow(ch){
	var name = (ch.USERNUM === '1')
		? decodeStringFromDB(ch.USER2NAME || 'Contact')
		: decodeStringFromDB(ch.USER1NAME || 'Contact');
	var myamt = (ch.USERNUM === '1') ? ch.USER1AMOUNT : ch.USER2AMOUNT;
	var total = ch.TOTALAMOUNT;
	var state = ch.STATE;
	var canPlay = state.startsWith('STATE_CHANNEL_OPEN');

	// Human-readable state label
	var stateLabel = state.replace('STATE_','').replace(/_/g,' ');

	// Counterparty Maxima ID for cancel/deny/accept messages
	var otherMaximaId = (ch.USERNUM === '1') ? ch.USER2MAXIMAID : ch.USER1MAXIMAID;

	var html = '<div class="channel-row'+(canPlay ? ' card-active' : '')+'">'
		+'<div style="flex:1;">'
		+'<div class="channel-name">'+name+'</div>'
		+'<div class="channel-state">'+stateLabel+'</div>'
		+'</div>'
		+'<div style="text-align:right; margin-right:16px;">'
		+'<div class="channel-balance">'+(myamt || '—')+'</div>'
		+'<div class="channel-total">'+(total ? 'of '+total+' total' : '')+'</div>'
		+'</div>'
		+'<div class="channel-actions">';

	// ---- Buttons depend on channel state ----

	if(state === 'STATE_SENT_START_CHANNEL'){
		// We sent a request, waiting for their response
		html += '<button class="btn btn-danger btn-sm" onclick="cancelChannel(\''+ch.HASHID+'\',\''+otherMaximaId+'\')">CANCEL</button>';

	}else if(state === 'STATE_REQUEST_START_CHANNEL'){
		// We RECEIVED a request — show ACCEPT / DENY
		html += '<button class="btn btn-danger btn-sm" onclick="denyChannel(\''+ch.HASHID+'\',\''+otherMaximaId+'\')">DENY</button> ';
		html += '<button class="btn btn-success btn-sm" onclick="acceptChannel(\''+ch.HASHID+'\',\''+otherMaximaId+'\')">ACCEPT</button>';

	}else if(state === 'STATE_REQUEST_ACCEPTED' || state === 'STATE_CHANNEL_CREATE_1' || state === 'STATE_CHANNEL_CREATE_2'){
		// Channel creation in progress
		html += '<span class="text-ghost" style="font-size:12px;">Setting up...</span>';

	}else if(canPlay){
		// Channel is open — can play games
		html += '<button class="btn btn-primary btn-sm" onclick="enterGame(\''+ch.HASHID+'\')">PLAY</button>';

	}else if(state === 'STATE_CHANNEL_START_CLOSE'){
		// Channel is closing
		html += '<span class="text-ghost" style="font-size:12px;">Closing...</span>';

	}else if(state === 'STATE_REQUEST_DENIED' || state === 'STATE_REQUEST_CANCELLED'){
		// Dead request
		html += '<span class="text-pink" style="font-size:12px;">'+stateLabel+'</span>';
	}

	html += '</div></div>';
	return html;
}

/* ---- Channel accept/deny/cancel actions ---- */

function acceptChannel(hashid, maximaid){
	// Get our user details for the accept message
	var userdets = getUserDetails();

	// Update user2 details on the channel (we are user2 — the receiver)
	updateChannelUser2(hashid, userdets, function(sqlrow){

		// Check we have enough balance
		checkBalance(sqlrow.USER2AMOUNT, sqlrow.TOKENID, function(valid){
			if(!valid){
				alert('Insufficient funds to join this channel!');
				return;
			}

			// Set our public key on the channel
			updateMyPublicKey(hashid, userdets.publickey, function(){

				// Send acceptance via Maxima
				acceptStartChannel(maximaid, hashid, function(delivered){
					if(delivered){
						insertLog(hashid, 'YOU_ACCEPT_CHANNEL',
							'Channel accepted for '+decodeStringFromDB(sqlrow.USER1NAME));

						updateChannelState(hashid, 'STATE_REQUEST_ACCEPTED', function(){
							loadChannels();
						});
					}else{
						alert('Could not contact the other user.');
					}
				});
			});
		});
	});
}

function denyChannel(hashid, maximaid){
	denyStartChannel(maximaid, hashid, function(delivered){
		insertLog(hashid, 'YOU_DENY_CHANNEL', 'Channel denied');
		loadChannels();
		if(!delivered){
			alert('Channel denied but could not notify the other user.');
		}
	});
}

function cancelChannel(hashid, maximaid){
	insertLog(hashid, 'YOU_CANCEL_REQUEST', 'Channel request cancelled');
	cancelNewChannel(hashid, maximaid, function(delivered){
		loadChannels();
	});
}

/* ---- New channel form ---- */
function loadNewChannelForm(){
	MDS.cmd("maxcontacts", function(mc){
		MAXIMA_CONTACTS = mc.response.contacts;
		var sel = document.getElementById('contact-select');
		sel.innerHTML = '';
		for(var i=0; i<MAXIMA_CONTACTS.length; i++){
			var opt = document.createElement('option');
			opt.value = MAXIMA_CONTACTS[i].publickey;
			opt.text = MAXIMA_CONTACTS[i].extradata.name;
			sel.appendChild(opt);
		}
	});

	MDS.cmd("balance", function(bal){
		USER_BALANCE = bal.response;
		var sel = document.getElementById('token-select');
		sel.innerHTML = '';
		for(var i=0; i<USER_BALANCE.length; i++){
			var opt = document.createElement('option');
			opt.value = USER_BALANCE[i].tokenid;
			opt.text = (USER_BALANCE[i].tokenid === '0x00') ? 'Minima' : USER_BALANCE[i].token.name;
			sel.appendChild(opt);
		}
	});
}

function requestChannel(){
	var selIdx  = document.getElementById('contact-select').selectedIndex;
	var pubkey  = MAXIMA_CONTACTS[selIdx].publickey;
	var name    = MAXIMA_CONTACTS[selIdx].extradata.name;
	var tokIdx  = document.getElementById('token-select').selectedIndex;
	var tokDets = USER_BALANCE[tokIdx];
	var tokName = (tokDets.tokenid === '0x00') ? 'Minima' : tokDets.token.name;
	var youAdd  = document.getElementById('you-add').value;
	var theyAdd = document.getElementById('they-add').value;

	if(!confirm('Request channel with '+name+'?\n\nYou add: '+youAdd+' '+tokName+'\nThey add: '+theyAdd+' '+tokName)){
		return;
	}

	if(tokDets.tokenid === '0x00'){
		doRequestChannel(pubkey, youAdd, theyAdd, tokName, tokDets.tokenid, '');
	}else{
		MDS.cmd("tokens action:export tokenid:"+tokDets.tokenid, function(tok){
			doRequestChannel(pubkey, youAdd, theyAdd, tokName, tokDets.tokenid, tok.response.data);
		});
	}
}

function doRequestChannel(pubkey, youAdd, theyAdd, tokName, tokId, tokData){
	requestNewChannel(pubkey, youAdd, theyAdd, tokName, tokId, tokData, function(delivered, hashid){
		if(!delivered){
			alert('Could not contact user. Check Maxima connections.');
			return;
		}
		insertLog(hashid, 'YOU_REQUEST_CHANNEL', 'Channel requested');
		alert('Channel request sent! Waiting for acceptance.');
		showView('channels');
	});
}

/* ---- Enter game session ---- */
function enterGame(hashid){
	CURRENT_CHANNEL = hashid;
	GAME_WINS = 0;
	GAME_LOSSES = 0;
	GAME_PROFIT = new Decimal(0);
	GAME_ROUNDS = 0;
	GAME_PHASE = 'IDLE';

	// Clear round pips
	document.getElementById('round-pips').innerHTML = '';

	// Load channel data and populate the game view
	sqlSelectChannel(hashid, function(sql){
		var ch = sql.rows[0];
		var myamt    = (ch.USERNUM === '1') ? ch.USER1AMOUNT : ch.USER2AMOUNT;
		var theiramt = (ch.USERNUM === '1') ? ch.USER2AMOUNT : ch.USER1AMOUNT;
		var name     = (ch.USERNUM === '1')
			? decodeStringFromDB(ch.USER2NAME || 'Contact')
			: decodeStringFromDB(ch.USER1NAME || 'Contact');

		document.getElementById('game-my-balance').textContent = myamt;
		document.getElementById('game-their-balance').textContent = theiramt;
		document.getElementById('game-channel-name').textContent = name;

		updateStats();
		selectGameType('flip');
		showView('game');
		addGameLog('system', 'Session started with '+name+'. Channel balance: '+myamt+' / '+theiramt);
	});
}

/* ---- Game type selection ---- */
function selectGameType(gametype){
	if(GAME_PHASE !== 'IDLE') return; // Don't allow switching during a round

	CURRENT_GAME = gametype;
	CURRENT_PICK = -1;

	// Update selector buttons
	document.querySelectorAll('.game-type-btn').forEach(function(btn){
		btn.classList.toggle('active', btn.dataset.game === gametype);
	});

	// Build pick grid
	var game = GAME_TYPES[gametype];
	var gridClass = 'pick-grid '+gametype;
	var html = '<div class="'+gridClass+'">';

	for(var i=0; i<game.range; i++){
		var label = getPickLabel(gametype, i);
		html += '<button class="pick-btn" data-pick="'+i+'" onclick="selectPick('+i+')">'+label+'</button>';
	}
	html += '</div>';
	document.getElementById('pick-container').innerHTML = html;

	// Update odds display
	var odds = (game.payout - 1) + ':1';
	document.getElementById('odds-display').textContent = game.name+' — '+game.range+' outcomes — '+odds+' payout';

	// Reset result display
	ANIM.hideAllStages();
	document.getElementById('result-number').textContent = '?';
	document.getElementById('result-number').className = 'result-number waiting';
	document.getElementById('result-label').textContent = 'PICK YOUR NUMBER';
	document.getElementById('result-label').className = 'result-label waiting';

	updatePlayButton();
}

/* ---- Pick selection ---- */
function selectPick(pick){
	if(GAME_PHASE !== 'IDLE') return;

	CURRENT_PICK = pick;
	SFX.chip_click();

	// Update visual selection
	document.querySelectorAll('.pick-btn').forEach(function(btn){
		btn.classList.toggle('selected', parseInt(btn.dataset.pick) === pick);
	});

	updatePlayButton();
}

function updatePlayButton(){
	var btn = document.getElementById('btn-play');
	if(GAME_PHASE !== 'IDLE'){
		btn.disabled = true;
		return;
	}
	var bet = parseFloat(document.getElementById('bet-amount').value);
	btn.disabled = (CURRENT_PICK < 0 || isNaN(bet) || bet <= 0);
}

/* ---- Play a round ---- */
function playRound(){
	if(!CURRENT_CHANNEL || CURRENT_PICK < 0 || GAME_PHASE !== 'IDLE') return;

	var betamt = document.getElementById('bet-amount').value;
	var gametype = CURRENT_GAME;
	var pick = CURRENT_PICK;
	var game = GAME_TYPES[gametype];

	// Validate bet amount
	var bet = parseFloat(betamt);
	if(isNaN(bet) || bet <= 0){
		alert('Enter a valid bet amount');
		return;
	}

	// Sound + animation for button press
	SFX.lever_pull();
	var btn = document.getElementById('btn-play');
	btn.classList.add('btn-pressed');
	setTimeout(function(){ btn.classList.remove('btn-pressed'); }, 200);
	ANIM.shakeGameArea();

	// Set game phase to PLACING
	setGamePhase('PLACING');

	addGameLog('info', 'Placing '+game.name+' bet: '+betamt+' on '+getPickLabel(gametype, pick));

	// Store our pick and bet so service.js can auto-commit when the house responds
	MDS.keypair.set("casino_pending_"+CURRENT_CHANNEL, JSON.stringify({
		gametype: gametype,
		pick: pick,
		betamt: betamt
	}));

	// Send GAME_REQUEST to the counterparty — they will auto-house it
	sqlSelectChannel(CURRENT_CHANNEL, function(sql){
		var ch = sql.rows[0];
		var othermax = (ch.USERNUM == '1') ? ch.USER2MAXIMAID : ch.USER1MAXIMAID;

		MDS.log("GAME_REQUEST: sending to "+othermax.substring(0,30)+".. hashid:"+CURRENT_CHANNEL+" game:"+gametype+" pick:"+pick+" bet:"+betamt);

		var msg = gameRequestMessage(CURRENT_CHANNEL, gametype, pick, betamt);
		MDS.log("GAME_REQUEST msg: "+JSON.stringify(msg));

		sendMaximaMessage(othermax, msg, function(maxresp){
			MDS.log("GAME_REQUEST maxresp: "+JSON.stringify(maxresp));

			if(maxresp && maxresp.response && maxresp.response.delivered){
				addGameLog('info', 'Request sent. Waiting for house...');
			}else{
				addGameLog('warn', 'Could not contact counterparty. Check Maxima.');
				MDS.log("GAME_REQUEST DELIVERY FAILED: "+JSON.stringify(maxresp));
				MDS.keypair.set("casino_pending_"+CURRENT_CHANNEL, "");
				setGamePhase('IDLE');
			}
		});
	});
}

/* ---- Display game result (called by state machine now, kept for compatibility) ---- */
function showResult(winner, result, gametype, pick){
	// This is now handled by the state machine via setGamePhase('RESULT')
	// But keep for any direct calls
	setGamePhase('RESULT', {
		result: result,
		winner: winner,
		gametype: gametype,
		pick: pick
	});
}

/* ---- Stats ---- */
function updateStats(){
	document.getElementById('stat-wins').textContent = GAME_WINS;
	document.getElementById('stat-losses').textContent = GAME_LOSSES;
	document.getElementById('stat-rounds').textContent = GAME_ROUNDS;

	var profitEl = document.getElementById('stat-profit');
	var profitVal = GAME_PROFIT.toFixed(2);
	profitEl.textContent = (GAME_PROFIT.greaterThanOrEqualTo(0) ? '+' : '') + profitVal;
	profitEl.className = 'stat-value ' + (GAME_PROFIT.greaterThanOrEqualTo(0) ? 'profit-up' : 'profit-down');
}

function addRoundPip(isWin, label){
	var pip = document.createElement('div');
	pip.className = 'round-pip ' + (isWin ? 'win' : 'loss');
	pip.textContent = label.substring(0, 2);
	document.getElementById('round-pips').appendChild(pip);
}

/* ---- Game log ---- */
function addGameLog(type, message){
	var log = document.getElementById('game-log');
	var time = new Date().toLocaleTimeString();
	var entry = document.createElement('div');
	entry.className = 'log-entry';
	entry.innerHTML = '<span class="log-time">'+time+'</span>'
		+'<span class="log-type '+type+'">'+type.toUpperCase()+'</span>'
		+'<span class="log-msg">'+message+'</span>';
	log.insertBefore(entry, log.firstChild);

	// Cap at 50 entries
	while(log.children.length > 50){
		log.removeChild(log.lastChild);
	}
}

function resetPlayButton(){
	var btn = document.getElementById('btn-play');
	btn.textContent = 'PLACE BET';
	btn.disabled = false;
}

/* ---- Channel close ---- */
function closeChannelPrompt(){
	if(!confirm('Close this channel?\n\nCooperative close sends 1 transaction.\nFunds return to both parties.')){
		return;
	}

	sqlSelectChannel(CURRENT_CHANNEL, function(sql){
		var ch = sql.rows[0];
		var othermax = (ch.USERNUM == '1') ? ch.USER2MAXIMAID : ch.USER1MAXIMAID;

		MDS.cmd("coins address:"+ch.FUNDINGADDRESS, function(fcoins){
			if(fcoins.response.length === 0){
				alert('Funding coin not found. Wait for confirmation.');
				return;
			}
			var coinage = fcoins.response[0].age;
			if(+coinage < 3){
				alert('Funding coin too young ('+coinage+' blocks). Wait a few more blocks.');
				return;
			}

			spendFundingTxn(ch, function(spendtxn){
				sendSpendFunding(CURRENT_CHANNEL, othermax, spendtxn, function(delivered){
					if(delivered){
						addGameLog('system', 'Cooperative close requested');
						alert('Close request sent!');
					}else{
						alert('Could not contact counterparty. Try unilateral close.');
					}
				});
			});
		});
	});
}

/* =========================================================================
 * MDS INITIALIZATION
 * ========================================================================= */

MDS.init(function(msg){

	if(msg.event === 'inited'){
		// Create database and load identity
		createDB(function(){
			initAuthDetails(function(){
				MDS.cmd("maxcontacts", function(mc){
					MAXIMA_CONTACTS = mc.response.contacts;
					loadChannels();
				});
			});
		});

	}else if(msg.event === 'MDSCOMMS'){
		// Messages from service.js
		if(!msg.data.public){
			var comms = JSON.parse(msg.data.message);

			if(comms.type === 'REFRESH_CHANNEL'){
				if(CURRENT_VIEW === 'channels') loadChannels();
				// Update game balances if we're in a game session
				if(CURRENT_VIEW === 'game' && CURRENT_CHANNEL){
					sqlSelectChannel(CURRENT_CHANNEL, function(sql){
						if(sql.count > 0){
							var ch = sql.rows[0];
							var myamt    = (ch.USERNUM === '1') ? ch.USER1AMOUNT : ch.USER2AMOUNT;
							var theiramt = (ch.USERNUM === '1') ? ch.USER2AMOUNT : ch.USER1AMOUNT;
							document.getElementById('game-my-balance').textContent = myamt;
							document.getElementById('game-their-balance').textContent = theiramt;
						}
					});
				}

			}else if(comms.type === 'GAME_EVENT' && comms.hashid === CURRENT_CHANNEL){

				if(comms.event === 'GAME_OFFER'){
					// We received a game offer — auto-accept for now
					addGameLog('info', 'Game offer received: '+comms.data.gametype);

				}else if(comms.event === 'BET_LOCKED'){
					addGameLog('info', 'Bet locked! Waiting for reveal...');
					// Trigger LOCKED phase
					if(GAME_PHASE === 'PLACING'){
						setGamePhase('LOCKED');
					} else {
						document.getElementById('result-label').textContent = 'BET LOCKED...';
					}

				}else if(comms.event === 'GAME_RESOLVED'){
					addGameLog('info', 'Game resolved! Winner: '+comms.data.winner);

				}else if(comms.event === 'GAME_RESULT_VERIFIED'){
					addGameLog('info', 'Result verified: '+comms.data.winner);

				}else if(comms.event === 'GAME_COMPLETE'){
					// Full round complete — show the result
					var winner = comms.data.winner;
					// Refresh channel data to get updated balances
					sqlSelectChannel(CURRENT_CHANNEL, function(sql){
						if(sql.count > 0){
							var ch = sql.rows[0];
							var myamt    = (ch.USERNUM === '1') ? ch.USER1AMOUNT : ch.USER2AMOUNT;
							var theiramt = (ch.USERNUM === '1') ? ch.USER2AMOUNT : ch.USER1AMOUNT;
							document.getElementById('game-my-balance').textContent = myamt;
							document.getElementById('game-their-balance').textContent = theiramt;
						}
					});

					// Determine if WE are the winner
					var amIBettor = true; // In current flow, we initiated the bet
					var isWin = (amIBettor && winner === 'player') || (!amIBettor && winner === 'house');

					// If we have result data, use the full animation
					if(comms.data.result !== undefined && GAME_PHASE !== 'IDLE'){
						setGamePhase('RESULT', {
							result: parseInt(comms.data.result),
							winner: isWin ? 'player' : 'house'
						});
					} else {
						// Fallback: basic display
						var numEl = document.getElementById('result-number');
						numEl.textContent = isWin ? 'WIN' : 'LOSE';
						numEl.className = 'result-number ' + (isWin ? 'win' : 'lose');

						var labelEl = document.getElementById('result-label');
						labelEl.textContent = isWin ? 'YOU WIN!' : 'YOU LOSE';
						labelEl.className = 'result-label ' + (isWin ? 'win' : 'lose');

						if(isWin){
							SFX.win_fanfare();
							ANIM.screenFlash('win');
							ANIM.confetti(20);
							ANIM.flashBalance(true);
							GAME_WINS++;
						} else {
							SFX.lose_wah();
							ANIM.screenFlash('lose');
							ANIM.flashBalance(false);
							GAME_LOSSES++;
						}
						GAME_ROUNDS++;
						updateStats();
						addRoundPip(isWin, isWin ? 'W' : 'L');
						resetPlayButton();
						GAME_PHASE = 'IDLE';
					}

				}else if(comms.event === 'GAME_ABANDONED'){
					addGameLog('warn', 'Game abandoned: '+comms.data.reason);
					setGamePhase('IDLE');
				}
			}
		}

	}else if(msg.event === 'MAXIMA'){
		// Handle Maxima messages in the frontend
		if(msg.data.application === 'thunderpay'){
			var datahex = msg.data.data;
			convertHEXtoJSON(datahex, function(maxmsg){
				MDS.log("INDEX.HTML MAXIMA ["+maxmsg.type+"] hashid:"+(maxmsg.hashid||"none"));

				if(maxmsg.type === 'SYNACK_MESSAGE'){
					synackMessageReceived(maxmsg);

				}else if(maxmsg.type === 'GAME_REQUEST'){
					// ---- AUTO-HOUSE: Someone wants to play against us ----
					MDS.log("AUTO-HOUSE: Received GAME_REQUEST for "+maxmsg.gametype+" bet:"+maxmsg.betamt);
					var requesterPubkey = msg.data.from;

					sqlSelectChannel(maxmsg.hashid, function(sql){
						if(sql.count == 0){
							MDS.log("AUTO-HOUSE: Channel NOT FOUND: "+maxmsg.hashid);
							return;
						}
						var sqlrow = sql.rows[0];
						var game = GAME_TYPES[maxmsg.gametype];
						if(!game){
							MDS.log("AUTO-HOUSE: Unknown game: "+maxmsg.gametype);
							return;
						}

						// Bettor is the sender (the other user)
						var bettor = (sqlrow.USERNUM == '1') ? 2 : 1;
						var validation = validateBet(sqlrow, maxmsg.betamt, game.range, maxmsg.pick, bettor);
						if(!validation.valid){
							MDS.log("AUTO-HOUSE: Bet invalid: "+validation.error);
							sendMaximaMessage(requesterPubkey,
								gameAbandonedMessage(maxmsg.hashid, "Bet invalid: "+validation.error));
							return;
						}

						// Generate house secret and commit
						MDS.log("AUTO-HOUSE: Generating house secret...");
						houseStartRound(maxmsg.hashid, maxmsg.gametype, function(data){
							if(!data){
								MDS.log("AUTO-HOUSE: Secret generation failed");
								return;
							}

							// Store house commit on channel
							MDS.sql("UPDATE channels SET housecommit='"+data.commit+"' WHERE hashid='"+maxmsg.hashid+"'", function(){
								MDS.log("AUTO-HOUSE: Sending GAME_OFFER with commit:"+data.commit.substring(0,16)+"..");

								// Send GAME_OFFER back
								sendMaximaMessage(requesterPubkey,
									gameOfferMessage(maxmsg.hashid, data.commit, maxmsg.gametype, game.range));
							});
						});
					});

				}else if(maxmsg.type === 'GAME_OFFER'){
					// ---- We requested a game, house sent us their commit ----
					MDS.log("GOT GAME_OFFER: house commit:"+maxmsg.housecommit.substring(0,16)+"..");

					// Trigger LOCKED phase via state machine
					if(GAME_PHASE === 'PLACING' && CURRENT_VIEW === 'game'){
						setGamePhase('LOCKED');
					}

					// Retrieve pending game request
					MDS.keypair.get("casino_pending_"+maxmsg.hashid, function(pendingres){
						if(!pendingres.status || !pendingres.value){
							MDS.log("No pending game for "+maxmsg.hashid);
							return;
						}
						var pending = JSON.parse(pendingres.value);
						MDS.log("AUTO-COMMIT: pick:"+pending.pick+" bet:"+pending.betamt+" game:"+pending.gametype);

						// Accept the game round
						acceptGameRound(maxmsg.hashid, maxmsg.housecommit,
							pending.gametype, pending.pick, pending.betamt,
							function(delivered){
								MDS.log("AUTO-COMMIT result: delivered="+delivered);
								if(delivered){
									if(CURRENT_VIEW === 'game'){
										addGameLog('info', 'Bet committed. Waiting for house reveal...');
									}
								}
								MDS.keypair.set("casino_pending_"+maxmsg.hashid, "");
							});
					});

				}else if(maxmsg.type === 'GAME_REVEAL'){
					// ---- House revealed secret, auto-resolve ----
					MDS.log("GOT GAME_REVEAL: resolving...");

					// Trigger SPINNING phase
					if((GAME_PHASE === 'LOCKED' || GAME_PHASE === 'PLACING') && CURRENT_VIEW === 'game'){
						setGamePhase('SPINNING');
					}

					updateGameHouseRevealed(maxmsg.hashid, maxmsg.housesecret, function(){
						resolveGameRound(maxmsg.hashid, maxmsg.housesecret, function(winner, delivered){
							MDS.log("RESOLVED: winner="+winner+" delivered="+delivered);
							if(winner){
								// Get result number from the game round
								sqlSelectChannel(maxmsg.hashid, function(sql){
									var resultNum = -1;
									var gametype = PHASE_GAMETYPE || CURRENT_GAME;
									if(sql.count > 0){
										var ch = sql.rows[0];
										// Try to get the actual result from the channel
										if(ch.GAMERESULTNUM !== undefined && ch.GAMERESULTNUM !== null){
											resultNum = parseInt(ch.GAMERESULTNUM);
										}
									}

									// If we have the result number and we're in an active game phase
									if(resultNum >= 0 && GAME_PHASE === 'SPINNING'){
										setGamePhase('RESULT', {
											result: resultNum,
											winner: winner
										});
									} else if(GAME_PHASE === 'SPINNING' || GAME_PHASE === 'LOCKED' || GAME_PHASE === 'PLACING'){
										// Compute outcome from secrets if we have them
										// Fall back to showing WIN/LOSE
										ANIM.hideStage(gametype);
										ANIM.setBorderState(null);
										var isWin = (winner === 'player');
										var numEl = document.getElementById('result-number');
										var labelEl = document.getElementById('result-label');

										if(isWin){
											SFX.win_fanfare();
											ANIM.screenFlash('win');
											ANIM.confetti(25);
											numEl.textContent = 'WIN';
											numEl.className = 'result-number win result-bounce';
											labelEl.textContent = 'YOU WIN!';
											labelEl.className = 'result-label win';
											ANIM.flashBalance(true);
											GAME_WINS++;
											var bv = new Decimal(PHASE_BETAMT || document.getElementById('bet-amount').value);
											var gm = GAME_TYPES[gametype];
											GAME_PROFIT = GAME_PROFIT.plus(bv.mul(gm.payout - 1));
											ANIM.floatAmount('+' + bv.mul(gm.payout - 1).toFixed(2), true);
										} else {
											SFX.lose_wah();
											ANIM.screenFlash('lose');
											ANIM.shakeGameArea();
											numEl.textContent = 'LOSE';
											numEl.className = 'result-number lose result-shake';
											labelEl.textContent = 'YOU LOSE';
											labelEl.className = 'result-label lose';
											ANIM.flashBalance(false);
											GAME_LOSSES++;
											var bv = new Decimal(PHASE_BETAMT || document.getElementById('bet-amount').value);
											GAME_PROFIT = GAME_PROFIT.sub(bv);
											ANIM.floatAmount('-' + bv.toFixed(2), false);
										}
										GAME_ROUNDS++;
										updateStats();
										addRoundPip(isWin, isWin ? 'W' : 'L');
										addGameLog(isWin ? 'win' : 'loss', 'Round result: ' + (isWin ? 'WIN' : 'LOSS'));

										// Refresh balances
										sqlSelectChannel(maxmsg.hashid, function(s3){
											if(s3.count>0){
												var ch2=s3.rows[0];
												var my2=(ch2.USERNUM==='1')?ch2.USER1AMOUNT:ch2.USER2AMOUNT;
												var th2=(ch2.USERNUM==='1')?ch2.USER2AMOUNT:ch2.USER1AMOUNT;
												document.getElementById('game-my-balance').textContent=my2;
												document.getElementById('game-their-balance').textContent=th2;
											}
										});

										setTimeout(function(){
											SFX.ready_chime();
											setGamePhase('IDLE');
										}, isWin ? 3000 : 2000);
									} else {
										// Not in game view or not in active phase
										document.getElementById('result-label').textContent = winner === 'player' ? 'YOU WIN!' : 'YOU LOSE';
										document.getElementById('result-number').textContent = winner === 'player' ? 'WIN' : 'LOSE';
										document.getElementById('result-number').className = 'result-number ' + (winner === 'player' ? 'win' : 'lose');
										document.getElementById('result-label').className = 'result-label ' + (winner === 'player' ? 'win' : 'lose');
										resetPlayButton();
										GAME_PHASE = 'IDLE';
									}
								});
							}
						});
					});

				}else if(maxmsg.type === 'GAME_ACCEPT'){
					// ---- Player accepted our game (we're the house) ----
					MDS.log("GOT GAME_ACCEPT: pick:"+maxmsg.pick+" bet:"+maxmsg.betamt);
					sqlSelectChannel(maxmsg.hashid, function(sql){
						if(sql.count == 0){ MDS.log("GAME_ACCEPT: no channel"); return; }
						var sqlrow = sql.rows[0];
						var bettor = (sqlrow.USERNUM == '1') ? 2 : 1;
						signGameBet(maxmsg.hashid, maxmsg.playercommit,
							sqlrow.HOUSECOMMIT, maxmsg.gametype, maxmsg.pick, maxmsg.betamt, bettor,
							function(settletxn, updatetxn){
								MDS.log("GAME_ACCEPT: pessimistic signed, sending to player");
								sqlSelectChannel(maxmsg.hashid, function(sql2){
									var newseq = sql2.rows[0].SEQUENCE;
									sendMaximaMessage(msg.data.from,
										gameBetSignedMessage(maxmsg.hashid, newseq, settletxn, updatetxn),
										function(){
											MDS.log("GAME_ACCEPT: auto-revealing...");
											revealGameSecret(maxmsg.hashid, function(ok){
												MDS.log("GAME_ACCEPT: reveal sent:"+ok);
											});
										});
								});
							});
					});

				}else if(maxmsg.type === 'GAME_BET_SIGNED'){
					// ---- House sent signed pessimistic balance (we're the player) ----
					MDS.log("GOT GAME_BET_SIGNED: co-signing...");

					// Trigger LOCKED phase if not already
					if(GAME_PHASE === 'PLACING' && CURRENT_VIEW === 'game'){
						setGamePhase('LOCKED');
					}

					sqlSelectChannel(maxmsg.hashid, function(sql){
						if(sql.count == 0){ return; }
						var sqlrow = sql.rows[0];
						signTxn(maxmsg.settletxn, sqlrow.USERPUBLICKEY, function(cs){
							signTxn(maxmsg.updatetxn, sqlrow.USERPUBLICKEY, function(cu){
								var ba = new Decimal(sqlrow.BETAMOUNT||'0');
								var bt = parseInt(sqlrow.BETTOR||'0');
								var u1 = new Decimal(sqlrow.PREBETAMT1||sqlrow.USER1AMOUNT);
								var u2 = new Decimal(sqlrow.PREBETAMT2||sqlrow.USER2AMOUNT);
								var n1 = (bt==1) ? u1.sub(ba).toString() : u1.plus(ba).toString();
								var n2 = (bt==1) ? u2.plus(ba).toString() : u2.sub(ba).toString();
								updateNewSequenceTxn(maxmsg.hashid, maxmsg.sequence, n1, n2, cs, cu, function(){
									MDS.log("BET LOCKED! Waiting for reveal...");
									addGameLog('info', 'Bet locked and co-signed. Awaiting reveal...');
								});
							});
						});
					});

				}else if(maxmsg.type === 'GAME_RESULT'){
					// ---- Player sent outcome (we're the house) — verify and send resolved balance ----
					MDS.log("GOT GAME_RESULT: winner="+maxmsg.winner);
					sqlSelectChannel(maxmsg.hashid, function(sql){
						if(sql.count==0){ return; }
						var sqlrow = sql.rows[0];
						MDS.cmd("hash data:"+maxmsg.playersecret, function(hr){
							if(hr.response.hash !== sqlrow.PLAYERCOMMIT){
								MDS.log("CHEAT: secret mismatch!"); return;
							}
							computeOutcome(sqlrow.HOUSESECRET, maxmsg.playersecret, parseInt(sqlrow.GAMERANGE), function(oc){
								var w = (oc.result==parseInt(sqlrow.PLAYERPICK)) ? "player" : "house";
								MDS.log("VERIFIED: "+w);
								updateGameResult(maxmsg.hashid, maxmsg.playersecret, (w==="player")?"LOSS":"WIN", function(){
									var nb = calculateGameBalance(sqlrow, w);
									var ns = new Decimal(sqlrow.SEQUENCE).plus(1);
									createSettlementTxn(sqlrow.HASHID, ns, sqlrow.ELTOOADDRESS, sqlrow.TOTALAMOUNT,
										nb.user1amount, sqlrow.USER1ADDRESS, nb.user2amount, sqlrow.USER2ADDRESS,
										sqlrow.TOKENID, null, function(st){
											createUpdateTxn(ns, sqlrow.ELTOOADDRESS, sqlrow.TOTALAMOUNT, sqlrow.TOKENID, null, function(ut){
												signTxn(st, sqlrow.USERPUBLICKEY, function(ss){
													signTxn(ut, sqlrow.USERPUBLICKEY, function(su){
														sendMaximaMessage(msg.data.from,
															gameResultSignedMessage(maxmsg.hashid, ns.toString(), ss, su));
														MDS.log("Resolved balance sent");
													});
												});
											});
										});
								});
							});
						});
					});

				}else if(maxmsg.type === 'GAME_RESULT_SIGNED'){
					// ---- Co-sign resolved balance and complete the round ----
					MDS.log("GOT GAME_RESULT_SIGNED: completing...");
					sqlSelectChannel(maxmsg.hashid, function(sql){
						if(sql.count==0){ return; }
						var sqlrow = sql.rows[0];
						var amI = (sqlrow.USERNUM==parseInt(sqlrow.BETTOR));
						var w = amI ? ((sqlrow.GAMERESULT==="WIN")?"player":"house") : ((sqlrow.GAMERESULT==="WIN")?"house":"player");
						var nb = calculateGameBalance(sqlrow, w);
						completeGameRound(maxmsg.hashid, maxmsg.sequence, maxmsg.settletxn, maxmsg.updatetxn,
							w, nb.user1amount, nb.user2amount, function(){
								MDS.log("ROUND COMPLETE! "+w);
								var isWin = (amI && w==='player') || (!amI && w==='house');

								if(CURRENT_VIEW==='game' && maxmsg.hashid === CURRENT_CHANNEL){
									// If game phase is already showing result from GAME_REVEAL, skip
									if(GAME_PHASE === 'WIN' || GAME_PHASE === 'LOSE') {
										// Already showing result, just update balances
										sqlSelectChannel(maxmsg.hashid, function(s3){
											if(s3.count>0){
												var ch=s3.rows[0];
												var my=(ch.USERNUM==='1')?ch.USER1AMOUNT:ch.USER2AMOUNT;
												var th=(ch.USERNUM==='1')?ch.USER2AMOUNT:ch.USER1AMOUNT;
												document.getElementById('game-my-balance').textContent=my;
												document.getElementById('game-their-balance').textContent=th;
											}
										});
										return;
									}

									// Show result with animations
									ANIM.hideStage(PHASE_GAMETYPE || CURRENT_GAME);
									ANIM.setBorderState(null);

									var numEl = document.getElementById('result-number');
									var labelEl = document.getElementById('result-label');

									if(isWin){
										SFX.win_fanfare();
										ANIM.screenFlash('win');
										ANIM.confetti(25);
										numEl.textContent = 'WIN';
										numEl.className = 'result-number win result-bounce';
										labelEl.textContent = 'YOU WIN!';
										labelEl.className = 'result-label win';
										ANIM.flashBalance(true);
										ANIM.floatAmount('+WIN', true);
									} else {
										SFX.lose_wah();
										ANIM.screenFlash('lose');
										ANIM.shakeGameArea();
										numEl.textContent = 'LOSE';
										numEl.className = 'result-number lose result-shake';
										labelEl.textContent = 'YOU LOSE';
										labelEl.className = 'result-label lose';
										ANIM.flashBalance(false);
										ANIM.floatAmount('-LOSE', false);
									}

									if(isWin){ GAME_WINS++; }else{ GAME_LOSSES++; }
									GAME_ROUNDS++;
									updateStats();
									addRoundPip(isWin, isWin ? 'W' : 'L');

									sqlSelectChannel(maxmsg.hashid, function(s3){
										if(s3.count>0){
											var ch=s3.rows[0];
											var my=(ch.USERNUM==='1')?ch.USER1AMOUNT:ch.USER2AMOUNT;
											var th=(ch.USERNUM==='1')?ch.USER2AMOUNT:ch.USER1AMOUNT;
											document.getElementById('game-my-balance').textContent=my;
											document.getElementById('game-their-balance').textContent=th;
										}
									});

									setTimeout(function(){
										SFX.ready_chime();
										setGamePhase('IDLE');
									}, isWin ? 3000 : 2000);
								}
							});
					});

				}else if(maxmsg.type === 'GAME_ABANDONED'){
					MDS.log("GAME_ABANDONED: "+maxmsg.reason);
					addGameLog('warn', 'Game abandoned: '+(maxmsg.reason || 'Unknown'));
					setGamePhase('IDLE');
				}
			});
		}

	}else if(msg.event === 'NEWBLOCK'){
		// Check for old items and clean up
		removeAllOldItems(function(somerem){
			if(somerem && CURRENT_VIEW === 'channels') loadChannels();
		});
	}
});

</script>
