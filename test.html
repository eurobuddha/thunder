/* =========================================================================
 * TEST FRAMEWORK
 * ========================================================================= */

var PASSED = 0;
var FAILED = 0;
var SKIPPED = 0;
var RESULTS = '';
var ASYNC_QUEUE = [];
var ASYNC_RUNNING = false;

function log(msg){ RESULTS += msg + '\n'; }
function section(name){ log('\n<span class="section">━━━ ' + name + ' ━━━</span>'); }
function subsection(name){ log('<span class="subsection">  ▸ ' + name + '</span>'); }

function assert(condition, testName, detail){
	if(condition){
		PASSED++;
		log('<span class="pass">  ✓ ' + testName + '</span>');
	} else {
		FAILED++;
		log('<span class="fail">  ✗ ' + testName + (detail ? ' — ' + detail : '') + '</span>');
	}
}

function assertEq(actual, expected, testName){
	var match = (actual === expected);
	if(!match && typeof actual === 'number' && typeof expected === 'number'){
		match = Math.abs(actual - expected) < 0.0001;
	}
	assert(match, testName, 'expected "' + expected + '", got "' + actual + '"');
}

function skip(testName, reason){
	SKIPPED++;
	log('<span class="skip">  ⊘ SKIP: ' + testName + ' — ' + reason + '</span>');
}

function renderResults(){
	var el = document.getElementById('results');
	el.innerHTML = RESULTS;
	var summaryClass = (FAILED === 0) ? 'all-pass' : 'has-fail';
	var total = PASSED + FAILED;
	var summary = (FAILED === 0)
		? '✓ ALL ' + PASSED + ' TESTS PASSED' + (SKIPPED ? ' (' + SKIPPED + ' skipped — need 2 nodes)' : '')
		: '✗ ' + FAILED + ' FAILED / ' + total + ' total (' + PASSED + ' passed, ' + SKIPPED + ' skipped)';
	el.innerHTML += '\n<div class="summary ' + summaryClass + '">' + summary + '</div>';
	document.getElementById('status').textContent = 'Complete: ' + total + ' tests, ' + FAILED + ' failed';
}

// Queue async tests to run sequentially
function queueAsync(fn){ ASYNC_QUEUE.push(fn); }
function runAsyncTests(){
	if(ASYNC_QUEUE.length === 0){
		renderResults();
		return;
	}
	var fn = ASYNC_QUEUE.shift();
	fn(function(){ runAsyncTests(); });
}

subsection('Bitmask: picksToBitmask');
assertEq(picksToBitmask([0]), 1, 'picksToBitmask([0]) = 1');

/* ---- 1.5 Winner Determination (bitmask bit check) ---- */

subsection('Winner Determination');
function testWinner(pick, result, expected){
	var bit = Math.floor(pick / Math.pow(2, result)) % 2;
	var winner = (bit === 1) ? 'player' : 'house';
	assertEq(winner, expected, 'pick='+pick+' result='+result+' → '+expected);
}
// Flip
testWinner(1, 0, 'player');  // Heads picked, result=Heads
testWinner(1, 1, 'house');   // Heads picked, result=Tails
testWinner(2, 1, 'player');  // Tails picked, result=Tails
testWinner(2, 0, 'house');   // Tails picked, result=Heads
// Dice multi-pick
testWinner(7, 0, 'player');  // picks 0,1,2 — result 0 = win
testWinner(7, 2, 'player');  // picks 0,1,2 — result 2 = win
testWinner(7, 3, 'house');   // picks 0,1,2 — result 3 = lose
testWinner(7, 5, 'house');   // picks 0,1,2 — result 5 = lose
testWinner(32, 5, 'player'); // pick 5 only — result 5 = win
testWinner(32, 4, 'house');  // pick 5 only — result 4 = lose
// Roulette
var mask17 = Math.pow(2, 17);
testWinner(mask17, 17, 'player');
testWinner(mask17, 16, 'house');
testWinner(mask17, 0, 'house');

function _checkPending(fundresp){
	if(!fundresp) return false;
	var arr = Array.isArray(fundresp) ? fundresp : [fundresp];
	for(var i=0; i<arr.length; i++){
		if(arr[i] && arr[i].pending === true) return true;
	}
	return false;
}

assert(!_checkPending(null), 'checkPending(null) = false');
assert(!_checkPending([{status:true, pending:false}]), 'checkPending(normal) = false');
assert(_checkPending([{status:true, pending:true}]), 'checkPending(pending) = true');
assert(_checkPending([{status:true, pending:false},{status:false, pending:true}]), 'checkPending(2nd pending) = true');
assert(!_checkPending([{status:true},{status:true}]), 'checkPending(no pending field) = false');
assert(!_checkPending({}), 'checkPending({}) = false');

section('PART 3: calculateGameBalance');

function mockGameRow(pre1, pre2, betamt, range, numpicks, bettor, total){
	return {
		PREBETAMT1: pre1.toString(), PREBETAMT2: pre2.toString(),
		BETAMOUNT: betamt.toString(), GAMERANGE: range.toString(),
		NUMPICKS: numpicks.toString(), BETTOR: bettor.toString(),
		TOTALAMOUNT: (total || (pre1+pre2)).toString(),
		USER1AMOUNT: (bettor==1 ? pre1-betamt : pre1+betamt).toString(),
		USER2AMOUNT: (bettor==2 ? pre2-betamt : pre2+betamt).toString()
	};
}

section('PART 4: Balance Preservation (total must always match)');

function checkTotal(label, pre1, pre2, ba, rn, np, bt, winner){
	var row = mockGameRow(pre1, pre2, ba, rn, np, bt);
	var r = calculateGameBalance(row, winner);
	var u1 = parseFloat(r.user1amount);
	var u2 = parseFloat(r.user2amount);
	var total = pre1 + pre2;
	assert(Math.abs((u1+u2) - total) < 0.01, label + ': sum preserved (' + (u1+u2) + '=' + total + ')');
	assert(u1 >= 0 && u2 >= 0, label + ': no negatives (u1=' + u1 + ' u2=' + u2 + ')');
}

 * PART 5: ON-CHAIN FORMULA MATCH
 * ========================================================================= */

section('PART 5: On-Chain Formula Match: wn = ba × (rn/np)');

function verifyOnChain(label, ba, rn, np, winner, pre1, pre2, bt){
	var wn = ba * (rn / np);
	var row = mockGameRow(pre1, pre2, ba, rn, np, bt);
	var r = calculateGameBalance(row, winner);
	var u1 = parseFloat(r.user1amount);
	var u2 = parseFloat(r.user2amount);
	var exp1, exp2;
	if(winner === 'player'){
		exp1 = bt===1 ? pre1+wn-ba : pre1-wn+ba;
		exp2 = bt===1 ? pre2-wn+ba : pre2+wn-ba;
	} else {
		exp1 = bt===1 ? pre1-ba : pre1+ba;
		exp2 = bt===1 ? pre2+ba : pre2-ba;
	}
	assert(Math.abs(u1-exp1)<0.01 && Math.abs(u2-exp2)<0.01, label + ' (wn='+wn+')');
}

verifyOnChain('Flip W', 10, 2, 1, 'player', 500, 500, 1);
verifyOnChain('Flip L', 10, 2, 1, 'house', 500, 500, 1);
verifyOnChain('Dice1 W', 50, 6, 1, 'player', 500, 500, 1);
verifyOnChain('Dice3 W', 30, 6, 3, 'player', 500, 500, 1);
verifyOnChain('Dice5 W', 50, 6, 5, 'player', 500, 500, 1);
verifyOnChain('Rou1 W', 10, 36, 1, 'player', 2000, 2000, 1);
verifyOnChain('Rou4 W', 40, 36, 4, 'player', 2000, 2000, 1);
verifyOnChain('Rou12 W', 120, 36, 12, 'player', 2000, 2000, 1);
verifyOnChain('Rou18 W', 180, 36, 18, 'player', 2000, 2000, 1);
verifyOnChain('Bt2 dice W', 30, 6, 2, 'player', 500, 500, 2);
verifyOnChain('Bt2 flip L', 10, 2, 1, 'house', 500, 500, 2);
verifyOnChain('Big rou W', 1000, 36, 1, 'player', 50000, 50000, 1);

section('PART 6: Burn Guard (verifyBalanceTotal)');

var bgRow = {TOTALAMOUNT:'1000', PREBETAMT1:'500', PREBETAMT2:'500', USER1AMOUNT:'500', USER2AMOUNT:'500'};

subsection('Valid balances');
var bg1 = verifyBalanceTotal(bgRow, '600', '400');
assertEq(bg1.user1amount, '600', 'Sum=1000: accepted');
var bg2 = verifyBalanceTotal(bgRow, '999.5', '0.5');

subsection('Reject: negative balances');
var bg3 = verifyBalanceTotal(bgRow, '-10', '1010');
assertEq(bg3.user1amount, '500', 'Negative u1: fallback to prebetamt');
var bg4 = verifyBalanceTotal(bgRow, '1010', '-10');
assertEq(bg4.user2amount, '500', 'Negative u2: fallback to prebetamt');

subsection('Reject: sum too low');

section('PART 9: MDS Integration Tests');

queueAsync(function(next){
	subsection('MDS.cmd — random + hash (secret generation)');
	MDS.cmd("random size:32", function(randresp){
		assert(randresp && randresp.status === true, 'MDS random: status=true');
		assert(randresp.response && randresp.response.random, 'MDS random: has random field');
		var secret = randresp.response.random;
		assert(secret.startsWith('0x'), 'Secret starts with 0x');
		assert(secret.length === 66, 'Secret is 32 bytes (66 hex chars with 0x)');

		MDS.cmd("hash data:"+secret, function(hashresp){
			assert(hashresp && hashresp.status === true, 'MDS hash: status=true');
			assert(hashresp.response && hashresp.response.hash, 'MDS hash: has hash field');
			var commit = hashresp.response.hash;
			assert(commit.startsWith('0x'), 'Commit starts with 0x');

			// Verify deterministic: same input → same hash
			MDS.cmd("hash data:"+secret, function(hash2){
				assertEq(hash2.response.hash, commit, 'Hash is deterministic');
				next();
			});
		});
	});
});

queueAsync(function(next){
	subsection('MDS.cmd — commit-reveal verification');
	MDS.cmd("random size:32", function(r1){
		MDS.cmd("random size:32", function(r2){
			var houseSecret = r1.response.random;
			var playerSecret = r2.response.random;

			// Hash house secret
			MDS.cmd("hash data:"+houseSecret, function(h1){
				var houseCommit = h1.response.hash;

				// Verify: SHA3(houseSecret) == houseCommit
				MDS.cmd("hash data:"+houseSecret, function(verify){
					assertEq(verify.response.hash, houseCommit, 'SHA3(secret) matches commit');

					// Compute combined hash for result
					MDS.cmd("concat data1:"+houseSecret+" data2:"+playerSecret, function(concatResp){
						if(concatResp && concatResp.response){
							var combined = concatResp.response.concat || concatResp.response;
							assert(typeof combined === 'string' || combined.value, 'Concat produces value');
						} else {
							skip('Concat test', 'concat command not available');
						}
						next();
					});
				});
			});
		});
	});
});

	MDS.cmd("txncreate id:test_txn_lifecycle", function(cr){
		assert(cr && cr.status === true, 'txncreate');

		MDS.cmd("txnstate id:test_txn_lifecycle port:100 value:TRUE", function(st){
			assert(st && st.status === true, 'txnstate port:100');

			MDS.cmd("txnexport id:test_txn_lifecycle", function(ex){
				assert(ex && ex.status === true, 'txnexport');
				assert(ex.response && ex.response.data, 'Export has data field');

					assert(dl && dl.status === true, 'txndelete');

					// Verify it was deleted (re-export should fail)
					MDS.cmd("txnexport id:test_txn_lifecycle", function(ex2){
						assert(!ex2.status || !ex2.response, 'Deleted txn cannot be exported');
						next();
					});
				});
			});
		});
	});
