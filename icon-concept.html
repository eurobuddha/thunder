<!DOCTYPE html>
<html>
<head>
<title>Thunder Casino — Icon Concepts</title>
<style>
body { background: #1a1a2e; display: flex; flex-wrap: wrap; gap: 40px; padding: 40px; font-family: sans-serif; color: #e6f1ff; }
.concept { text-align: center; }
.concept p { margin-top: 12px; font-size: 14px; color: #8892b0; }
.sizes { display: flex; gap: 16px; align-items: end; margin-top: 12px; justify-content: center; }
.sizes span { font-size: 10px; color: #555; }
</style>
</head>
<body>

<div class="concept">
<p><strong>Concept A:</strong> Lightning through casino chip</p>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0e1f3d"/>
    </linearGradient>
    <linearGradient id="goldA" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#e8961f"/>
    </linearGradient>
    <linearGradient id="boltGlowA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="glowA">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="url(#bgA)" stroke="#1a2140" stroke-width="4"/>
  <!-- Outer chip ring -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="#f5a623" stroke-width="3" opacity="0.4"/>
  <!-- Chip notches -->
  <g opacity="0.5">
    <rect x="125" y="10" width="6" height="20" rx="3" fill="#f5a623" transform="rotate(0, 128, 128)"/>
    <rect x="125" y="10" width="6" height="20" rx="3" fill="#f5a623" transform="rotate(45, 128, 128)"/>
    <rect x="125" y="10" width="6" height="20" rx="3" fill="#f5a623" transform="rotate(90, 128, 128)"/>
    <rect x="125" y="10" width="6" height="20" rx="3" fill="#f5a623" transform="rotate(135, 128, 128)"/>
    <rect x="125" y="10" width="6" height="20" rx="3" fill="#f5a623" transform="rotate(180, 128, 128)"/>
    <rect x="125" y="10" width="6" height="20" rx="3" fill="#f5a623" transform="rotate(225, 128, 128)"/>
    <rect x="125" y="10" width="6" height="20" rx="3" fill="#f5a623" transform="rotate(270, 128, 128)"/>
    <rect x="125" y="10" width="6" height="20" rx="3" fill="#f5a623" transform="rotate(315, 128, 128)"/>
  </g>
  <!-- Inner chip ring -->
  <circle cx="128" cy="128" r="88" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.3"/>
  <!-- Lightning bolt — bold, centered -->
  <g filter="url(#glowA)">
    <polygon points="140,30 90,132 122,132 104,226 170,118 134,118" fill="url(#boltGlowA)"/>
  </g>
  <!-- TC text at bottom -->
  <text x="128" y="200" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="28" font-weight="900" fill="#ffd700" opacity="0.6">TC</text>
</svg>
<div class="sizes">
  <div>
    <svg width="48" height="48" viewBox="0 0 256 256"><circle cx="128" cy="128" r="124" fill="#0a1628" stroke="#1a2140" stroke-width="4"/><circle cx="128" cy="128" r="110" fill="none" stroke="#f5a623" stroke-width="5" opacity="0.4"/><polygon points="140,30 90,132 122,132 104,226 170,118 134,118" fill="#ffd700"/></svg>
    <span>48px</span>
  </div>
</div>
</div>

<div class="concept">
<p><strong>Concept B:</strong> Bold bolt + die face</p>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c18"/>
      <stop offset="100%" stop-color="#141c38"/>
    </linearGradient>
    <linearGradient id="goldB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <filter id="glowB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="248" height="248" rx="48" fill="url(#bgB)" stroke="#1a2140" stroke-width="4"/>
  <!-- Lightning bolt — large, dramatic -->
  <g filter="url(#glowB)">
    <polygon points="152,16 80,136 120,136 96,240 184,112 140,112" fill="url(#goldB)"/>
  </g>
  <!-- Small die in bottom-right corner -->
  <g transform="translate(170, 170)">
    <rect width="60" height="60" rx="12" fill="#e6f1ff" opacity="0.9"/>
    <circle cx="15" cy="15" r="5" fill="#080c18"/>
    <circle cx="45" cy="15" r="5" fill="#080c18"/>
    <circle cx="15" cy="45" r="5" fill="#080c18"/>
    <circle cx="45" cy="45" r="5" fill="#080c18"/>
    <circle cx="30" cy="30" r="5" fill="#080c18"/>
  </g>
</svg>
<div class="sizes">
  <div>
    <svg width="48" height="48" viewBox="0 0 256 256"><rect x="4" y="4" width="248" height="248" rx="48" fill="#080c18" stroke="#1a2140" stroke-width="4"/><polygon points="152,16 80,136 120,136 96,240 184,112 140,112" fill="#ffd700"/><g transform="translate(170,170)"><rect width="60" height="60" rx="12" fill="#e6f1ff" opacity="0.9"/><circle cx="15" cy="15" r="5" fill="#080c18"/><circle cx="45" cy="15" r="5" fill="#080c18"/><circle cx="15" cy="45" r="5" fill="#080c18"/><circle cx="45" cy="45" r="5" fill="#080c18"/><circle cx="30" cy="30" r="5" fill="#080c18"/></g></svg>
    <span>48px</span>
  </div>
</div>
</div>

<div class="concept">
<p><strong>Concept C:</strong> Minimal bolt in gold ring</p>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#111a32"/>
    </linearGradient>
    <linearGradient id="ringC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#f5a623"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <filter id="glowC">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="124" fill="url(#bgC)"/>
  <!-- Bold gold ring -->
  <circle cx="128" cy="128" r="112" fill="none" stroke="url(#ringC)" stroke-width="8"/>
  <!-- Inner shadow ring -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.2"/>
  <!-- Clean lightning bolt -->
  <g filter="url(#glowC)">
    <polygon points="144,38 92,128 124,128 108,218 164,122 132,122" fill="#ffd700"/>
  </g>
</svg>
<div class="sizes">
  <div>
    <svg width="48" height="48" viewBox="0 0 256 256"><circle cx="128" cy="128" r="124" fill="#0a0f1e"/><circle cx="128" cy="128" r="112" fill="none" stroke="#ffd700" stroke-width="8"/><polygon points="144,38 92,128 124,128 108,218 164,122 132,122" fill="#ffd700"/></svg>
    <span>48px</span>
  </div>
</div>
</div>

<div class="concept">
<p><strong>Concept D:</strong> Neon bolt on dark, coin edge</p>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgD" cx="0.3" cy="0.3">
      <stop offset="0%" stop-color="#141c38"/>
      <stop offset="100%" stop-color="#060a14"/>
    </radialGradient>
    <linearGradient id="neonD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="40%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
    <filter id="neonGlowD">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Coin-like circle -->
  <circle cx="128" cy="128" r="124" fill="url(#bgD)"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#f5a623" stroke-width="2" opacity="0.5"/>
  <circle cx="128" cy="128" r="116" fill="none" stroke="#f5a623" stroke-width="1" opacity="0.3"/>
  <!-- Ridged coin edge -->
  <g opacity="0.35">
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(0,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(15,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(30,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(45,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(60,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(75,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(90,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(105,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(120,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(135,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(150,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(165,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(180,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(195,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(210,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(225,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(240,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(255,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(270,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(285,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(300,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(315,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(330,128,128)"/>
    <line x1="128" y1="2" x2="128" y2="12" stroke="#f5a623" stroke-width="2" transform="rotate(345,128,128)"/>
  </g>
  <!-- Neon lightning bolt -->
  <g filter="url(#neonGlowD)">
    <polygon points="146,32 88,130 122,130 102,224 172,120 136,120" fill="url(#neonD)"/>
  </g>
</svg>
<div class="sizes">
  <div>
    <svg width="48" height="48" viewBox="0 0 256 256"><circle cx="128" cy="128" r="124" fill="#060a14"/><circle cx="128" cy="128" r="120" fill="none" stroke="#f5a623" stroke-width="3" opacity="0.5"/><polygon points="146,32 88,130 122,130 102,224 172,120 136,120" fill="#ffd700"/></svg>
    <span>48px</span>
  </div>
</div>
</div>

</body>
